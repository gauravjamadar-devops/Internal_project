apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gauravjamadar-devops/Internal_project.git'
    targetRevision: helm-charts
    path: fastapi-chart
    helm:
      valueFiles:
        - ../environment/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
