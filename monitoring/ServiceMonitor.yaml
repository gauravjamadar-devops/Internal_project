apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fastapi-servicemonitor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: fastapi   # lowercase to match your service
  namespaceSelector:
    matchNames:
      - dev
  endpoints:
    - port: http     # must match the port name in your Service
      path: /metrics
      interval: 30s
